<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EcoTrack AI Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #08111b, #0f172a);
        color: #e2e8f0;
        font-family: Arial, Helvetica, sans-serif;
      }
      .panel {
        max-width: 420px;
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.78);
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>EcoTrack AI is offline</h1>
      <p>Your last cached pages and locally stored footprint data stay available. Reconnect to sync new logs and refreshed scores.</p>
    </div>
  </body>
</html>
